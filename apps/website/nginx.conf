server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro generates pre-rendered HTML files
    # /how-it-works -> /how-it-works/index.html
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Dashboard SPA fallback (client:only island handles routing)
    location /dashboard {
        try_files $uri /dashboard/index.html;
    }

    # Astro hashed assets — cache forever
    location /_astro {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache fonts
    location ~* \.(woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache env-config.js (runtime config)
    location = /env-config.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Custom 404
    error_page 404 /404.html;
}
