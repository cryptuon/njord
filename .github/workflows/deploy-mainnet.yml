name: Deploy to Mainnet

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "DEPLOY_TO_MAINNET" to confirm'
        required: true
        default: ""
      commit_sha:
        description: 'Commit SHA to deploy (must match current HEAD)'
        required: true
        default: ""

# Require manual approval from multiple team members
concurrency:
  group: mainnet-deployment
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    name: Pre-Deployment Verification
    runs-on: ubuntu-latest
    outputs:
      verified: ${{ steps.verify.outputs.verified }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment confirmation
        id: verify
        run: |
          if [[ "${{ github.event.inputs.confirm_deploy }}" != "DEPLOY_TO_MAINNET" ]]; then
            echo "::error::Invalid confirmation. Type 'DEPLOY_TO_MAINNET' to proceed."
            exit 1
          fi

          if [[ "${{ github.event.inputs.commit_sha }}" != "${{ github.sha }}" ]]; then
            echo "::error::Commit SHA mismatch. Expected: ${{ github.sha }}"
            exit 1
          fi

          echo "verified=true" >> $GITHUB_OUTPUT

      - name: Check branch protection
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Mainnet deployments must be from the main branch"
            exit 1
          fi

  build:
    name: Build Program
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.verified == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: programs/njord

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.30.1
          avm use 0.30.1

      - name: Build program
        run: anchor build

      - name: Generate checksum
        run: |
          sha256sum target/deploy/njord.so > njord.so.sha256
          echo "Program checksum:"
          cat njord.so.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mainnet-build
          path: |
            target/deploy/njord.so
            target/deploy/njord-keypair.json
            target/idl/njord.json
            njord.so.sha256
          retention-days: 90

  # Manual approval gate
  approve-deployment:
    name: Await Manual Approval
    runs-on: ubuntu-latest
    needs: build
    environment: mainnet-production

    steps:
      - name: Deployment approved
        run: echo "Deployment has been approved by required reviewers"

  deploy:
    name: Deploy to Solana Mainnet
    runs-on: ubuntu-latest
    needs: approve-deployment
    environment: mainnet-production

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mainnet-build
          path: target/deploy

      - name: Verify checksum
        run: |
          sha256sum -c target/deploy/njord.so.sha256

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Setup keypair
        run: |
          mkdir -p ~/.config/solana
          echo "${{ secrets.MAINNET_DEPLOYER_KEYPAIR }}" > ~/.config/solana/id.json
          solana config set --url mainnet-beta
          solana config set --keypair ~/.config/solana/id.json

      - name: Check deployer balance
        run: |
          BALANCE=$(solana balance | awk '{print $1}')
          echo "Deployer balance: $BALANCE SOL"
          if (( $(echo "$BALANCE < 5" | bc -l) )); then
            echo "::error::Insufficient balance for deployment (minimum 5 SOL required)"
            exit 1
          fi

      - name: Deploy to mainnet
        run: |
          echo "Deploying to Solana Mainnet..."
          solana program deploy \
            --program-id target/deploy/njord-keypair.json \
            target/deploy/njord.so \
            --url mainnet-beta
          echo "Deployment complete!"

      - name: Verify deployment
        run: |
          PROGRAM_ID=$(solana-keygen pubkey target/deploy/njord-keypair.json)
          echo "Verifying program: $PROGRAM_ID"
          solana program show $PROGRAM_ID --url mainnet-beta

      - name: Save deployment info
        run: |
          PROGRAM_ID=$(solana-keygen pubkey target/deploy/njord-keypair.json)
          DEPLOYER=$(solana-keygen pubkey ~/.config/solana/id.json)

          cat > deployment-info.json << EOF
          {
            "network": "mainnet-beta",
            "programId": "$PROGRAM_ID",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployer": "$DEPLOYER",
            "commitSha": "${{ github.sha }}",
            "workflowRun": "${{ github.run_id }}"
          }
          EOF

          cat deployment-info.json

      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: mainnet-deployment-info
          path: |
            deployment-info.json
            target/idl/njord.json
          retention-days: 365

  notify:
    name: Post-Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "::notice::Mainnet deployment successful!"
          echo "Program ID: Hm5WfS2KL4UPaUqVJ3vadCuPMCftw2oybqvpDr7fn9Hv"

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "::error::Mainnet deployment failed!"
